<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دخول إلى الحساب</title>
  <script src="https://cdn.tailwindcss.com"></script>
  {% csrf_token %}

  <style>
    body {
      font-family: ui-sans-serif, system-ui;
    }
    .video-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }
    .login-card {
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
    }
  </style>
</head>

<body class="bg-white text-gray-900">

<!-- HERO -->
<section class="relative overflow-hidden min-h-screen flex items-center justify-center p-5">

  <video class="video-bg" autoplay muted loop>
    <source src="/media/videos/bg.mp4" type="video/mp4">
  </video>

  <div class="absolute -top-32 -left-32 w-96 h-96 bg-green-300 blur-3xl opacity-30 rounded-full"></div>
  <div class="absolute -bottom-32 -right-32 w-96 h-96 bg-blue-300 blur-3xl opacity-30 rounded-full"></div>

  <div class="relative w-full max-w-md">
    <div class="login-card bg-white bg-opacity-10 backdrop-blur-xl rounded-3xl shadow-2xl p-8 md:p-12">

      <div class="text-center mb-8">
        <h1 class="text-3xl md:text-4xl font-extrabold text-gray-900">
          🔐 دخول
        </h1>
        <p class="mt-2 text-gray-600">
          دخول للحساب
        </p>
      </div>

      {% if error %}
        <div class="mb-6 p-4 bg-red-100 border border-red-400 text-red-700 rounded-xl">
          {{ error }}
        </div>
      {% endif %}

      <form method="POST" class="space-y-6">
        {% csrf_token %}
        
        <div>
          <label for="username" class="block text-sm font-semibold text-gray-700 mb-2">
            اسم المستخدم
          </label>
          <input 
            type="text" 
            id="username" 
            name="username" 
            required
            class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 focus:outline-none bg-white bg-opacity-50 transition"
            placeholder="أدخل اسم المستخدم">
        </div>

        <div>
          <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">
            كلمة المرور
          </label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            required
            class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 focus:outline-none bg-white bg-opacity-50 transition"
            placeholder="أدخل كلمة المرور">
        </div>

        <button 
          type="submit"
          class="w-full bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white font-semibold py-3 px-6 rounded-xl transition transform hover:scale-105 mt-8">
          دخول
        </button>
      </form>

      <div class="mt-8 text-center text-sm text-gray-600">
        <p>
          ليس لديك حساب؟ 
          <a target="_blank" href="https://wa.me/+212688524320" class="text-blue-600 hover:text-blue-700 font-semibold">
            تواصل معنا
          </a>
        </p>
      </div>

      <div class="mt-6 pt-6 border-t border-gray-200 text-center">
        <a href="/" class="text-gray-600 hover:text-gray-900 font-medium">
          ← العودة للصفحة الرئيسية
        </a>
      </div>

    </div>
  </div>

</section>

</body>
</html>
