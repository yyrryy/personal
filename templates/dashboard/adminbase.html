<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الإدارة</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: ui-sans-serif, system-ui;
    }
    .modal {
      display: none;
    }
    .modal.active {
      display: flex;
    }
  </style>
</head>

<body class="bg-gray-50 text-gray-900">

<!-- HEADER -->
<header class="bg-white shadow border-b-4 border-orange-500">
  <div class="max-w-7xl mx-auto px-4 md:px-6 py-4 flex justify-between items-center">
    <div>
      <a href="/dashboard/" class="text-2xl md:text-3xl font-extrabold text-gray-900">
        🔐 لوحة الإدارة
      </a>
      <p class="text-gray-600 text-sm mt-1">مرحبا {{ user.first_name|default:user.username }}</p>
    </div>
    <div class="flex items-center gap-4">
      <span class="px-3 py-1 rounded-full text-sm font-semibold {% if is_superadmin %}bg-red-100 text-red-700{% else %}bg-orange-100 text-orange-700{% endif %}">
        {% if is_superadmin %}
          مسؤول
        {% endif %}
      </span>
      <a href="/dashboard/services" class="px-4 py-2 bg-green-500 hover:bg-green-600 text-white rounded-lg font-semibold transition">
        خدمات
      </a>
      <a href="/logout" class="px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg font-semibold transition">
        تسجيل الخروج
      </a>
    </div>
  </div>
</header>

<!-- MAIN CONTENT -->
<div class="max-w-7xl mx-auto px-4 md:px-6 py-8">
    <!-- block content -->
    {% block content %}
    {% endblock %}
</div>
{% block js %}
{% endblock %}
</body>
</html>
